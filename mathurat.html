<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Mathurat Harian</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  direction: rtl;
}

header {
  padding: 25px;
}

h1 {
  color: gold;
}

.card {
  background: rgba(255,255,255,0.08);
  margin: 15px auto;
  padding: 20px;
  width: 85%;
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>🌙 المأثورات اليومية</h1>
  <p>Zikir & Doa Harian</p>
</header>

<!-- DOA ARAB -->
<div class="card">
  <h3>دعاء الصباح</h3>
  <p>اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا</p>
</div>

<div class="card">
  <h3>دعاء الحفظ</h3>
  <p>بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ</p>
</div>

<div class="card">
  <h3>الاستغفار</h3>
  <p>أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ</p>
</div>

<!-- AUDIO -->
<button onclick="playAudio()">▶ تشغيل الذكر</button>

<audio id="audio">
  <source src="zikir.mp3" type="audio/mpeg">
</audio>

<script>
function playAudio() {
  let audio = document.getElementById("audio");

  audio.play().catch(() => {
    alert("Klik sekali screen dulu baru audio boleh jalan 👍");
  });
}
</script>

</body>
</html>
